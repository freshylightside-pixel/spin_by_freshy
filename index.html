<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>بطاطس قطاطس</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060608">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red:#ff1a3c; --blue:#006eff; --gold:#ffd700; --gold2:#ffaa00; --bg:#060608; }
  html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:'Rajdhani',sans-serif; color:white; user-select:none; }

  #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
  body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.09) 3px,rgba(0,0,0,0.09) 4px); pointer-events:none; z-index:200; }

  .app { position:relative; z-index:10; width:100%; height:100vh; display:flex; align-items:center; justify-content:center; gap:36px; padding:20px; }
  .wheel-col { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }

  h2 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,5vw,3.8rem); letter-spacing:0.22em; background:linear-gradient(135deg,#ffd700,#ffaa00,#ff6600); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 18px rgba(255,180,0,0.7)); animation:titleFlicker 6s ease-in-out infinite; }
  .title-sub { font-family:'Orbitron',monospace; font-size:0.6rem; letter-spacing:0.5em; color:rgba(255,215,0,0.5); text-align:center; margin-top:-2px; margin-bottom:14px; }
  @keyframes titleFlicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.7} 94%{opacity:1} 96%{opacity:0.85} 97%{opacity:1} }

  .deco-ring { position:absolute; border-radius:50%; border:1px solid rgba(255,215,0,0.15); animation:decoSpin 25s linear infinite; pointer-events:none; }
  .deco-ring.r1 { width:430px; height:430px; border-style:dashed; }
  .deco-ring.r2 { width:472px; height:472px; animation-direction:reverse; animation-duration:18s; border-color:rgba(0,110,255,0.12); }
  @keyframes decoSpin { to { transform:rotate(360deg); } }

  .ticks { position:absolute; width:472px; height:472px; border-radius:50%; animation:decoSpin 30s linear infinite reverse; pointer-events:none; }
  .tick { position:absolute; left:50%; top:0; width:2px; height:11px; background:rgba(255,215,0,0.35); transform-origin:50% 236px; margin-left:-1px; border-radius:2px; }

  .pointer-wrap { position:relative; z-index:30; margin-bottom:-24px; display:flex; flex-direction:column; align-items:center; }
  .pointer-glow { width:4px; height:14px; background:linear-gradient(to bottom,var(--gold),transparent); }
  .pointer { width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:36px solid var(--gold); filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 20px var(--gold2)); animation:pointerPulse 0.8s ease-in-out infinite alternate; }
  @keyframes pointerPulse { from{filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 20px var(--gold2))} to{filter:drop-shadow(0 0 16px var(--gold)) drop-shadow(0 0 40px var(--gold2)) drop-shadow(0 0 2px #fff)} }

  .wheel-stage { position:relative; display:flex; align-items:center; justify-content:center; }
  .wheel-outer { border-radius:50%; padding:9px; background:conic-gradient(#ff1a3c 0deg,#ff6600 60deg,#ffd700 120deg,#006eff 180deg,#8800ff 240deg,#ff1a3c 360deg); box-shadow:0 0 40px rgba(255,30,60,0.5),0 0 80px rgba(0,110,255,0.3); animation:outerGlow 3s ease-in-out infinite alternate; }
  @keyframes outerGlow { from{box-shadow:0 0 30px rgba(255,30,60,0.5),0 0 60px rgba(0,110,255,0.3)} to{box-shadow:0 0 60px rgba(255,30,60,0.7),0 0 100px rgba(0,110,255,0.5),0 0 140px rgba(255,215,0,0.2)} }
  .wheel-outer.flash { animation:flashRing 0.15s ease-in-out 6; }
  @keyframes flashRing { 0%,100%{box-shadow:0 0 40px rgba(255,215,0,0.5)} 50%{box-shadow:0 0 100px rgba(255,215,0,1),0 0 200px rgba(255,215,0,0.6)} }canvas#wheel { display:block; border-radius:50%; border:4px solid rgba(255,255,255,0.12); transition:transform 5s cubic-bezier(0.05,0.9,0.1,1.0); cursor:pointer; }
  canvas#wheel.spinning { cursor:not-allowed; }
  #speed-canvas { position:absolute; border-radius:50%; pointer-events:none; z-index:26; opacity:0; transition:opacity 0.2s; }
  #speed-canvas.active { opacity:1; }
  .tick-flash { position:absolute; width:100%; height:100%; border-radius:50%; border:3px solid rgba(255,215,0,0); pointer-events:none; z-index:25; }
  .tick-flash.active { animation:tickFlash 0.06s ease-out forwards; }
  @keyframes tickFlash { 0%{border-color:rgba(255,215,0,0.8);box-shadow:0 0 20px rgba(255,215,0,0.4)} 100%{border-color:rgba(255,215,0,0);box-shadow:none} }

  .btn-wrap { margin-top:22px; position:relative; }
  .btn-wrap::before,.btn-wrap::after { content:''; position:absolute; width:8px; height:8px; border-color:var(--gold); border-style:solid; opacity:0.6; }
  .btn-wrap::before { top:-3px; left:-3px; border-width:2px 0 0 2px; }
  .btn-wrap::after  { bottom:-3px; right:-3px; border-width:0 2px 2px 0; }
  .spin-btn { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.25em; padding:11px 55px; background:transparent; border:2px solid var(--gold); color:var(--gold); cursor:pointer; border-radius:3px; position:relative; overflow:hidden; clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); text-shadow:0 0 10px rgba(255,215,0,0.6); box-shadow:0 0 20px rgba(255,215,0,0.2),inset 0 0 30px rgba(255,215,0,0.04); transition:all 0.25s; }
  .spin-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,215,0,0.15),transparent); transform:translateX(-100%); transition:transform 0.4s; }
  .spin-btn:hover::before { transform:translateX(100%); }
  .spin-btn:hover { box-shadow:0 0 40px rgba(255,215,0,0.5),inset 0 0 30px rgba(255,215,0,0.08); }
  .spin-btn:active { transform:scale(0.97); }
  .spin-btn:disabled { opacity:0.3; cursor:not-allowed; }

  #result { margin-top:16px; min-height:3rem; display:flex; flex-direction:column; align-items:center; gap:2px; opacity:0; transform:translateY(14px) scale(0.95); transition:opacity 0.55s,transform 0.55s; }
  #result.show { opacity:1; transform:translateY(0) scale(1); }
  .result-label { font-family:'Orbitron',monospace; font-size:0.65rem; letter-spacing:0.4em; color:rgba(255,255,255,0.4); text-transform:uppercase; }
  .result-winner { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.6rem,4vw,2.8rem); letter-spacing:0.15em; background:linear-gradient(135deg,#ffd700,#ff9900,#ffd700); background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:shimmer 2s linear infinite; filter:drop-shadow(0 0 15px rgba(255,180,0,0.8)); }
  @keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }

  .panel { width:260px; flex-shrink:0; background:rgba(255,255,255,0.03); border:1px solid rgba(255,215,0,0.15); border-radius:8px; padding:20px 16px; display:flex; flex-direction:column; gap:14px; backdrop-filter:blur(6px); box-shadow:0 0 30px rgba(0,0,0,0.4),inset 0 0 20px rgba(255,215,0,0.02); max-height:520px; }
  .panel-title { font-family:'Orbitron',monospace; font-size:0.7rem; letter-spacing:0.4em; color:rgba(255,215,0,0.7); text-transform:uppercase; text-align:center; padding-bottom:10px; border-bottom:1px solid rgba(255,215,0,0.1); }
  .add-row { display:flex; gap:8px; }
  .name-input { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,215,0,0.2); border-radius:4px; padding:8px 10px; color:white; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:600; outline:none; transition:border-color 0.2s,box-shadow 0.2s; user-select:text; }
  .name-input::placeholder { color:rgba(255,255,255,0.25); }
  .name-input:focus { border-color:rgba(255,215,0,0.5); box-shadow:0 0 10px rgba(255,215,0,0.1); }add-btn { background:var(--gold); border:none; border-radius:4px; color:#0a0a0a; font-family:'Bebas Neue',sans-serif; font-size:1.3rem; padding:0 14px; cursor:pointer; transition:all 0.2s; line-height:1; }
  .add-btn:hover { background:#ffe44d; transform:scale(1.05); }
  .names-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px; min-height:0; padding-right:2px; }
  .names-list::-webkit-scrollbar { width:4px; }
  .names-list::-webkit-scrollbar-track { background:rgba(255,255,255,0.03); border-radius:2px; }
  .names-list::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.25); border-radius:2px; }
  .name-item { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:5px; padding:7px 10px; transition:all 0.2s; animation:itemIn 0.25s ease-out; }
  @keyframes itemIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .name-item:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,215,0,0.2); }
  .name-item.winner-highlight { background:rgba(255,215,0,0.12); border-color:rgba(255,215,0,0.5); box-shadow:0 0 12px rgba(255,215,0,0.2); }
  .item-color { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .item-name { flex:1; font-family:'Rajdhani',sans-serif; font-weight:600; font-size:0.95rem; color:rgba(255,255,255,0.9); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .item-del { background:none; border:none; color:rgba(255,80,80,0.5); cursor:pointer; font-size:1rem; padding:0 2px; line-height:1; transition:color 0.2s,transform 0.2s; flex-shrink:0; }
  .item-del:hover { color:#ff4444; transform:scale(1.2); }
  .panel-footer { display:flex; gap:8px; padding-top:10px; border-top:1px solid rgba(255,215,0,0.1); }
  .footer-btn { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:4px; color:rgba(255,255,255,0.5); font-family:'Orbitron',monospace; font-size:0.55rem; letter-spacing:0.1em; padding:7px 4px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; }
  .footer-btn:hover { background:rgba(255,255,255,0.1); color:white; border-color:rgba(255,215,0,0.3); }
  .footer-btn.danger:hover { background:rgba(255,50,50,0.15); color:#ff6666; border-color:rgba(255,50,50,0.3); }
  .count-badge { font-family:'Orbitron',monospace; font-size:0.6rem; color:rgba(255,215,0,0.4); text-align:center; letter-spacing:0.1em; }

  .ripple { position:fixed; border-radius:50%; border:2px solid rgba(255,215,0,0.6); transform:scale(0); animation:rippleOut 0.7s ease-out forwards; pointer-events:none; z-index:999; }
  @keyframes rippleOut { to{transform:scale(6);opacity:0} }
  .confetti { position:fixed; pointer-events:none; z-index:500; animation:confettiFall var(--dur) ease-in forwards; }
  @keyframes confettiFall { 0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(0.3);opacity:0} }
  .empty-msg { text-align:center; color:rgba(255,255,255,0.2); font-size:0.85rem; padding:20px 0; font-style:italic; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="app">
  <div class="panel">
    <div class="panel-title">⚙ إدارة الأسماء</div>
    <div class="add-row">
      <input class="name-input" id="nameInput" type="text" placeholder="اكتب اسم..." maxlength="20">
      <button class="add-btn" onclick="addName()">+</button>
    </div>
    <div class="names-list" id="namesList"></div>
    <div class="count-badge" id="countBadge">0 أسماء</div>
    <div class="panel-footer">
      <button class="footer-btn" onclick="shuffleNames()">🔀 خلط</button>
      <button class="footer-btn danger" onclick="clearAll()">🗑 مسح الكل</button>
    </div>
  </div>

  <div class="wheel-col">
    <h2>بطاطس قطاطس</h2>
    <div class="title-sub">Fortune Wheel · نظام العشوائي</div>
    <div class="pointer-wrap">
      <div class="pointer-glow"></div>
      <div class="pointer"></div>
    </div>
    <div class="wheel-stage">
  <div class="deco-ring r1"></div>
      <div class="deco-ring r2"></div>
      <div class="ticks" id="ticks"></div>
      <div class="wheel-outer" id="wheelOuter">
        <div class="tick-flash" id="tickFlash"></div>
        <canvas id="speed-canvas" width="360" height="360"></canvas>
        <canvas id="wheel" width="360" height="360" onclick="spin()"></canvas>
      </div>
    </div>
    <div class="btn-wrap">
      <button class="spin-btn" id="spinBtn" onclick="spin()">▶ SPIN</button>
    </div>
    <div id="result">
      <div class="result-label">Winner</div>
      <div class="result-winner" id="winnerText"></div>
    </div>
  </div>
</div>

<script>
// ── BACKGROUND ──
const bgCanvas=document.getElementById('bg-canvas'),bgCtx=bgCanvas.getContext('2d');
let stars=[];
function resizeBg(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;}
resizeBg(); window.addEventListener('resize',resizeBg);
for(let i=0;i<140;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,speed:Math.random()*0.008+0.002,phase:Math.random()*Math.PI*2});
let bgT=0;
function drawBg(){
  bgT+=0.016; bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  const grd=bgCtx.createRadialGradient(bgCanvas.width/2,bgCanvas.height/2,80,bgCanvas.width/2,bgCanvas.height/2,bgCanvas.width*0.7);
  grd.addColorStop(0,'rgba(0,40,80,0.5)'); grd.addColorStop(1,'rgba(6,6,8,0)');
  bgCtx.fillStyle=grd; bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  stars.forEach(s=>{
    const alpha=0.3+0.5*Math.abs(Math.sin(bgT*s.speed*60+s.phase));
    bgCtx.beginPath(); bgCtx.arc(s.x*bgCanvas.width,s.y*bgCanvas.height,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,255,${alpha})`; bgCtx.fill();
  });
  bgCtx.save(); bgCtx.globalAlpha=0.13;
  const gh=bgCanvas.height,gw=bgCanvas.width,horizon=gh*0.72;
  bgCtx.strokeStyle='#006eff'; bgCtx.lineWidth=0.7;
  for(let i=0;i<=14;i++){const bx=i*(gw/14);bgCtx.beginPath();bgCtx.moveTo(gw/2+(bx-gw/2)*0.01,horizon);bgCtx.lineTo(bx,gh);bgCtx.stroke();}
  for(let j=1;j<=18;j++){const t=Math.pow(j/18,2),y=horizon+(gh-horizon)*t;bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(gw,y);bgCtx.stroke();}
  bgCtx.restore();
  requestAnimationFrame(drawBg);
}
drawBg();

// ── TICK MARKS ──
const ticksEl=document.getElementById('ticks');
for(let i=0;i<36;i++){const t=document.createElement('div');t.className='tick';t.style.transform=`rotate(${i*10}deg)`;ticksEl.appendChild(t);}

// ── COLOR PALETTE ──
const PALETTE=[
  {fill1:'#cc0020',fill2:'#880010',edge:'#ff4466'},
  {fill1:'#0044bb',fill2:'#002880',edge:'#44aaff'},
  {fill1:'#007a30',fill2:'#004d1e',edge:'#44ff88'},
  {fill1:'#884400',fill2:'#552900',edge:'#ffaa44'},
  {fill1:'#660080',fill2:'#3d004d',edge:'#cc44ff'},
  {fill1:'#006688',fill2:'#003d52',edge:'#44ddff'},
  {fill1:'#886600',fill2:'#523d00',edge:'#ffd044'},
  {fill1:'#880033',fill2:'#520020',edge:'#ff4488'},
  {fill1:'#004488',fill2:'#002255',edge:'#44aaff'},
  {fill1:'#336600',fill2:'#1e3d00',edge:'#88ff44'},
];

// ── STATE ──
let names=["king110.","Fresh_lightside"];
let winnerIndex=-1;
function getStyle(i){return PALETTE[i%PALETTE.length];}
function getColor(i){return PALETTE[i%PALETTE.length].edge;}

// ── PANEL ──
function renderPanel(){
  const list=document.getElementById('namesList'),badge=document.getElementById('countBadge');
  list.innerHTML='';
  if(names.length===0){list.innerHTML='<div class="empty-msg">لا يوجد أسماء<br>أضف اسم فوق ☝</div>';}
  else{names.forEach((name,i)=>{
    const item=document.createElement('div');
    item.className='name-item'+(i===winnerIndex?' winner-highlight':'');
    item.innerHTML=`<div class="item-color" style="background:${getColor(i)}"></div><div class="item-name" title="${name}">${name}</div><button class="item-del" onclick="removeName(${i})">✕</button>`;
    list.appendChild(item);
  });}
  badge.textContent=`${names.length} ${names.length===1?'اسم':'أسماء'}`;
  drawWheel();
}

function addName(){
  const input=document.getElementById('nameInput'),val=input.value.trim();
  if(!val) return;
  if(names.length>=20){alert('الحد الأقصى 20 اسم!');return;}
  names.push(val); input.value=''; winnerIndex=-1;
  document.getElementById('result').classList.remove('show');
  renderPanel(); input.focus();
}

function removeName(i){
  if(names.length<=2){alert('يجب أن يكون فيه اسمين على الأقل!');return;}
  names.splice(i,1); winnerIndex=-1;
  document.getElementById('result').classList.remove('show');
  renderPanel();
}

function shuffleNames(){
  for(let i=names.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[names[i],names[j]]=[names[j],names[i]];}
  winnerIndex=-1; renderPanel();
}

function clearAll(){
  if(!confirm('تبي تمسح كل الأسماء؟')) return;
  names=[]; winnerIndex=-1;
  document.getElementById('result').classList.remove('show');
  renderPanel();
}

document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter') addName();});

// ── WHEEL ──
const canvas=document.getElementById('wheel'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height,CX=W/2,CY=H/2,R=CX-4;
let currentAngle=0,isSpinning=false;

function lighten(hex,a){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xff)+a)},${Math.min(255,(n&0xff)+a)})`;}

function drawWheel(hl=-1){
  ctx.clearRect(0,0,W,H);
  const size=names.length;
  if(size===0){
    ctx.fillStyle='rgba(255,255,255,0.05)';ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font="bold 18px 'Rajdhani',sans-serif";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('أضف أسماء →',CX,CY);return;
  }
  const arc=(2*Math.PI)/size;
  for(let i=0;i<size;i++){
    const s=getStyle(i),sa=i*arc,ea=(i+1)*arc,isHL=(i===hl);
    const g=ctx.createRadialGradient(CX,CY,0,CX,CY,R);
    g.addColorStop(0,isHL?lighten(s.fill1,50):s.fill1);g.addColorStop(1,isHL?lighten(s.fill2,30):s.fill2);
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,sa,ea);ctx.closePath();ctx.fillStyle=g;ctx.fill();
    const sh=ctx.createLinearGradient(CX,CY-R,CX,CY+R);
    sh.addColorStop(0,'rgba(255,255,255,0.1)');sh.addColorStop(0.5,'rgba(255,255,255,0)');sh.addColorStop(1,'rgba(0,0,0,0.18)');
    ctx.fillStyle=sh;ctx.fill();
    ctx.beginPath();ctx.arc(CX,CY,R,sa,ea);ctx.lineWidth=3;ctx.strokeStyle=s.edge;ctx.shadowColor=s.edge;ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
    ctx.save();ctx.translate(CX,CY);ctx.rotate(sa+arc/2);
    const fontSize=size>10?13:size>6?15:17;
    ctx.font=`bold ${fontSize}px 'Rajdhani',sans-serif`;ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=6;
    const label=names[i].length>12?names[i].slice(0,11)+'…':names[i];
    ctx.fillText(label,R*0.52,0);ctx.shadowBlur=0;ctx.restore();
  }
  const arc2=(2*Math.PI)/size;
  for(let i=0;i<size;i++){ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+Math.cos(i*arc2)*R,CY+Math.sin(i*arc2)*R);ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();}
  const hub=ctx.createRadialGradient(CX,CY,0,CX,CY,20);hub.addColorStop(0,'#fff');hub.addColorStop(0.3,'#ffd700');hub.addColorStop(1,'#cc8800');
  ctx.beginPath();ctx.arc(CX,CY,20,0,Math.PI*2);ctx.fillStyle=hub;ctx.shadowColor='#ffd700';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(CX,CY,9,0,Math.PI*2);ctx.fillStyle='#0a0a0a';ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,4,0,Math.PI*2);ctx.fillStyle='#ffd700';ctx.fill();
}

// ── SPEED LINES ──
const spdCanvas=document.getElementById('speed-canvas'),spdCtx=spdCanvas.getContext('2d');
function drawSpeedLines(intensity){
  spdCtx.clearRect(0,0,360,360);if(intensity<=0) return;
  const n=Math.floor(16*intensity);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,r1=130+Math.random()*28,r2=168+Math.random()*12;
    spdCtx.beginPath();spdCtx.moveTo(180+Math.cos(a)*r1,180+Math.sin(a)*r1);spdCtx.lineTo(180+Math.cos(a)*r2,180+Math.sin(a)*r2);
    spdCtx.strokeStyle=`rgba(255,215,0,${0.12+intensity*0.35})`;spdCtx.lineWidth=1.5;spdCtx.stroke();
  }
}

// ── AUDIO ──
let audioCtx=null;function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTick(pitch=1){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(900*pitch,ac.currentTime);o.frequency.exponentialRampToValueAtTime(300,ac.currentTime+0.05);g.gain.setValueAtTime(0.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.07);o.start();o.stop(ac.currentTime+0.08);}catch(e){}}
function playWhoosh(){try{const ac=getAC(),len=ac.sampleRate*0.12,buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);const src=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();f.type='bandpass';f.frequency.value=1600;g.gain.setValueAtTime(0.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination);src.start();}catch(e){}}
function playFanfare(){try{const ac=getAC();[523,659,784,1047].forEach((freq,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(0,ac.currentTime+i*0.12);g.gain.linearRampToValueAtTime(0.08,ac.currentTime+i*0.12+0.05);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.25);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*0.12);o.stop(ac.currentTime+i*0.12+0.3);});}catch(e){}}

// ── SPIN ──
function spin(){
  if(isSpinning) return;
  if(names.length<2){alert('أضف اسمين على الأقل!');return;}
  isSpinning=true;
  document.getElementById('spinBtn').disabled=true;
  canvas.classList.add('spinning');
  document.getElementById('result').classList.remove('show');
  winnerIndex=-1;
  const picked=Math.floor(Math.random()*names.length);
  const size=names.length,sliceDeg=360/size;
  const targetAngle=360-(picked*sliceDeg)-sliceDeg/2;
  const totalSpin=1800+targetAngle;
  currentAngle+=totalSpin;
  canvas.style.transform=`rotate(${currentAngle}deg)`;
  const START=Date.now(),DURATION=5000;
  let lastTick=0;
  spdCanvas.classList.add('active');
  const loop=setInterval(()=>{
    const elapsed=Date.now()-START,progress=Math.min(elapsed/DURATION,1);
    const ease=1-Math.pow(progress,3);
    drawSpeedLines(ease*0.9);
    const slicesCrossed=Math.floor(totalSpin*progress/sliceDeg);
    if(slicesCrossed>lastTick){lastTick=slicesCrossed;playTick(0.7+ease*0.6);playWhoosh();const tf=document.getElementById('tickFlash');tf.classList.remove('active');void tf.offsetWidth;tf.classList.add('active');}
    if(progress>=1){clearInterval(loop);spdCanvas.classList.remove('active');drawSpeedLines(0);onSpinEnd(picked);}
  },50);
}

function onSpinEnd(picked){
  winnerIndex=picked;
  const outer=document.getElementById('wheelOuter');
  outer.classList.add('flash');setTimeout(()=>outer.classList.remove('flash'),1000);
  playFanfare();drawWheel(picked);launchConfetti();createRipple();
  setTimeout(()=>{
    document.getElementById('winnerText').textContent='🏆 '+names[picked];
    document.getElementById('result').classList.add('show');
    renderPanel();isSpinning=false;document.getElementById('spinBtn').disabled=false;canvas.classList.remove('spinning');
  },400);
}

// ── CONFETTI ──
function launchConfetti(){
  const rect=canvas.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const cols=['#ffd700','#ff2244','#0088ff','#ffffff','#ff9900','#00ffaa','#ff44ff'];
  const shapes=['◆','★','●','▲','■'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');el.className='confetti';
    const a=Math.random()*Math.PI*2,dist=120+Math.random()*280;
    el.style.cssText=`left:${cx}px;top:${cy}px;color:${cols[Math.floor(Math.random()*cols.length)]};font-size:${8+Math.random()*14}px;--dx:${Math.cos(a)*dist}px;--dy:${Math.sin(a)*dist-130}px;--rot:${(Math.random()-0.5)*720}deg;--dur:${0.8+Math.random()*0.9}s;animation-delay:${Math.random()*0.3}s;`;
    el.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
  }
}

function createRipple(){
  const btn=document.getElementById('spinBtn'),rect=btn.getBoundingClientRect();
  const el=document.createElement('div');el.className='ripple';
  el.style.cssText=`width:40px;height:40px;left:${rect.left+rect.width/2-20}px;top:${rect.top+rect.height/2-20}px;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),800);
}

canvas.addEventListener('click',e=>{
  if(isSpinning) return;
  const el=document.createElement('div');el.className='ripple';
  el.style.cssText=`width:30px;height:30px;left:${e.clientX-15}px;top:${e.clientY-15}px;border-color:rgba(255,255,255,0.5);`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),800);
});

renderPanel();
</script>
